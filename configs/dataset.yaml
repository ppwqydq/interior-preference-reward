paths:
  raw_dir: data/raw
  empty_room_image_dir: data/images/empty_room
  generated_furniture_image_dir: data/images/generated_furniture
  output_manifest: data/processed/samples.jsonl
  build_report: data/reports/dataset_build_report.json
  failed_downloads: data/reports/failed_downloads.jsonl
  log_dir: logs

csv:
  encoding: utf-8-sig
  recursive_pattern: "*.csv"

columns:
  behavior: 反馈行为原始值
  empty_room_url: 空房间图
  generated_furniture_url: 生成家具图

labels:
  thumbs up: 1
  dislike: 0

download:
  workers: 16
  connect_timeout_seconds: 10
  read_timeout_seconds: 60
  retries: 3
  max_image_size_mb: 40
  user_agent: interior-preference-reward/1.0
